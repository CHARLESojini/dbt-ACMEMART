version: 2

sources:
  - name: bronze
    description: "Raw data ingested by Airbyte from upstream source systems. All columns load as VARCHAR — type enforcement happens at the silver layer."
    database: ACMEMART
    schema: bronze
    tables:
      - name: sales_csv
        description: "Raw sales transactions ingested from CSV via Airbyte. Composite primary key pattern STORE-YYYYMMDD-SEQ. Contains mixed timestamp formats (ISO and DD/MM/YYYY) handled defensively in stg_sales. NOTE: Freshness contract intentionally omitted — dbt-fusion preview build does not yet support source freshness at the table level. Add back when migrating to stable release: warn_after 7d, error_after 30d, loaded_at_field _airbyte_extracted_at."
        columns:
          - name: transaction_id
            description: "Composite key STORE-YYYYMMDD-SEQ. Primary key."
            data_tests:
              - not_null
              - unique
          - name: transaction_timestamp
            description: "Transaction time as raw string; mixed ISO and DD/MM/YYYY formats parsed in stg_sales."
          - name: store_id
            description: "Store identifier."
          - name: customer_id
            description: "Customer identifier."
          - name: product_id
            description: "Product identifier."
          - name: product_name
            description: "Product name; trimmed in silver."
          - name: category
            description: "Product category; uppercased in silver."
          - name: quantity
            description: "Units sold per transaction."
          - name: unit_price
            description: "Price per unit."
          - name: total_amount
            description: "Transaction total."
          - name: payment_method
            description: "Payment method used."
          - name: _airbyte_extracted_at
            description: "Airbyte sync timestamp; will anchor freshness checks when freshness contract is re-enabled."
            data_tests:
              - not_null
          - name: _airbyte_raw_id
            description: "Airbyte-assigned raw record ID."
          - name: _ab_source_file_url
            description: "Source CSV file URL."